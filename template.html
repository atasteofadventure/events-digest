<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__DIGEST_TITLE__</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f4;
    color: #1c1917;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px 64px;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 24px;
    letter-spacing: -0.01em;
  }

  /* Tabs */
  .tab-nav {
    display: flex;
    gap: 24px;
    border-bottom: 1px solid #e7e5e4;
    margin-bottom: 28px;
  }

  .tab {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 8px 0 10px;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    color: #78716c;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .tab:hover {
    color: #44403c;
  }

  .tab.active {
    color: #1c1917;
    border-bottom-color: #1c1917;
  }

  .tab .count {
    font-size: 0.75rem;
    font-weight: 500;
    color: #a8a29e;
    margin-left: 4px;
  }

  .tab.active .count {
    color: #78716c;
  }

  /* Tab panels */
  .tab-panel {
    display: none;
  }

  .tab-panel.active {
    display: block;
  }

  /* Category sections */
  .category-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #a8a29e;
    margin-bottom: 12px;
    margin-top: 28px;
  }

  .category-label:first-child {
    margin-top: 0;
  }

  /* Event cards */
  .event-card {
    background: #fff;
    border: 1px solid #e7e5e4;
    border-radius: 8px;
    border-left: 3px solid var(--accent, #a8a29e);
    padding: 16px 18px;
    margin-bottom: 12px;
  }

  .event-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }

  .event-name {
    font-weight: 600;
    font-size: 0.95rem;
    color: #1c1917;
    text-decoration: none;
  }

  .event-name:hover {
    text-decoration: underline;
  }

  .price-badge {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .price-badge.free {
    background: #ecfdf5;
    color: #059669;
  }

  .price-badge.paid {
    background: #f5f5f4;
    color: #78716c;
  }

  .event-meta {
    font-size: 0.8rem;
    color: #78716c;
    margin-bottom: 6px;
  }

  .event-meta span + span::before {
    content: "\00b7";
    margin: 0 6px;
  }

  .event-why {
    font-size: 0.85rem;
    font-style: italic;
    color: #57534e;
    margin-bottom: 10px;
  }

  .feedback-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .feedback-btn {
    font-family: inherit;
    font-size: 0.7rem;
    background: #fff;
    border: 1px solid #d6d3d1;
    border-radius: 4px;
    padding: 3px 8px;
    cursor: pointer;
    color: #78716c;
    transition: border-color 0.15s, color 0.15s;
  }

  .feedback-btn:hover {
    border-color: #a8a29e;
    color: #44403c;
  }

  .feedback-btn.selected-positive {
    border-color: #059669;
    color: #059669;
  }

  .feedback-btn.selected-negative {
    border-color: #dc2626;
    color: #dc2626;
  }

  /* Discovered Sources */
  .sources-section {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid #e7e5e4;
  }

  .sources-title {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #a8a29e;
    margin-bottom: 12px;
  }

  .source-item {
    background: #fff;
    border: 1px solid #e7e5e4;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
  }

  .source-name {
    font-weight: 600;
    font-size: 0.9rem;
    color: #1c1917;
    text-decoration: none;
  }

  .source-name:hover {
    text-decoration: underline;
  }

  .source-desc {
    font-size: 0.8rem;
    color: #78716c;
    margin-top: 2px;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: #a8a29e;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<div class="container">
  <h1 id="digest-title"></h1>
  <nav class="tab-nav" id="tab-nav"></nav>
  <div id="tab-panels"></div>
  <div id="sources-container"></div>
</div>

<script>
var EVENTS_DATA = /*__EVENTS_JSON__*/{"meta":{"title":"Sample Week","type":"week"},"weekday_events":[],"weekend_events":[],"discovered_sources":[]}/**/;

(function() {
  'use strict';

  var CATEGORY_ORDER = [
    'tech_ai',
    'talks_lectures',
    'workshops_classes',
    'tours_experiences',
    'film_screenings',
    'art_exhibitions'
  ];

  var CATEGORY_CONFIG = {
    tech_ai:           { label: 'Tech & AI',            color: '#3b82f6' },
    talks_lectures:    { label: 'Talks & Lectures',     color: '#8b5cf6' },
    workshops_classes:  { label: 'Workshops & Classes',   color: '#f59e0b' },
    tours_experiences:  { label: 'Tours & Experiences',   color: '#10b981' },
    film_screenings:    { label: 'Film & Screenings',     color: '#ef4444' },
    art_exhibitions:    { label: 'Art & Exhibitions',     color: '#ec4899' }
  };

  var POSITIVE_SIGNALS = ['good_pick', 'more_like_this'];

  var SHORT_DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  var SHORT_MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                      'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

  function formatDate(dateStr) {
    var parts = dateStr.split('-');
    var d = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
    return SHORT_DAYS[d.getDay()] + ', ' + SHORT_MONTHS[d.getMonth()] + ' ' + d.getDate();
  }

  function groupByCategory(events) {
    var groups = {};
    for (var i = 0; i < events.length; i++) {
      var cat = events[i].category || 'other';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(events[i]);
    }
    return groups;
  }

  function createEl(tag, className) {
    var el = document.createElement(tag);
    if (className) el.className = className;
    return el;
  }

  function createTabButton(label, tabKey, count) {
    var btn = createEl('button', 'tab');
    btn.setAttribute('data-tab', tabKey);
    btn.appendChild(document.createTextNode(label + ' '));
    var countSpan = createEl('span', 'count');
    countSpan.textContent = String(count);
    btn.appendChild(countSpan);
    return btn;
  }

  function createEventCard(evt) {
    var card = createEl('div', 'event-card');
    var catConfig = CATEGORY_CONFIG[evt.category];
    if (catConfig) {
      card.style.setProperty('--accent', catConfig.color);
    }

    // Header: name link + price badge
    var header = createEl('div', 'event-header');

    var nameLink = createEl('a', 'event-name');
    nameLink.textContent = evt.name;
    nameLink.href = evt.url || '#';
    nameLink.target = '_blank';
    nameLink.rel = 'noopener noreferrer';
    header.appendChild(nameLink);

    if (evt.price) {
      var badge = createEl('span', 'price-badge');
      var isFree = evt.price.toLowerCase() === 'free';
      badge.className = 'price-badge ' + (isFree ? 'free' : 'paid');
      badge.textContent = evt.price;
      header.appendChild(badge);
    }

    card.appendChild(header);

    // Meta line
    var meta = createEl('div', 'event-meta');
    var metaParts = [];
    if (evt.date) metaParts.push(formatDate(evt.date));
    if (evt.time) metaParts.push(evt.time);
    if (evt.venue) metaParts.push(evt.venue);
    if (evt.neighborhood) metaParts.push(evt.neighborhood);

    for (var m = 0; m < metaParts.length; m++) {
      var span = createEl('span');
      span.textContent = metaParts[m];
      meta.appendChild(span);
    }
    card.appendChild(meta);

    // Why sentence
    if (evt.why) {
      var why = createEl('div', 'event-why');
      why.textContent = evt.why;
      card.appendChild(why);
    }

    // Feedback buttons
    var feedbackRow = createEl('div', 'feedback-row');
    var signals = [
      { key: 'good_pick',     label: 'Good pick' },
      { key: 'not_for_me',    label: 'Not for me' },
      { key: 'more_like_this', label: 'More like this' },
      { key: 'less_like_this', label: 'Less like this' }
    ];

    for (var s = 0; s < signals.length; s++) {
      var btn = createEl('button', 'feedback-btn');
      btn.textContent = signals[s].label;
      btn.setAttribute('data-event-id', evt.id);
      btn.setAttribute('data-signal', signals[s].key);
      feedbackRow.appendChild(btn);
    }
    card.appendChild(feedbackRow);

    return card;
  }

  function renderEvents(events, container) {
    if (!events || events.length === 0) {
      var empty = createEl('div', 'empty-state');
      empty.textContent = 'No events yet.';
      container.appendChild(empty);
      return;
    }

    var groups = groupByCategory(events);

    for (var c = 0; c < CATEGORY_ORDER.length; c++) {
      var catKey = CATEGORY_ORDER[c];
      var catEvents = groups[catKey];
      if (!catEvents || catEvents.length === 0) continue;

      var config = CATEGORY_CONFIG[catKey];
      var label = createEl('div', 'category-label');
      label.textContent = config ? config.label : catKey;
      container.appendChild(label);

      for (var e = 0; e < catEvents.length; e++) {
        container.appendChild(createEventCard(catEvents[e]));
      }
    }

    // Render any categories not in CATEGORY_ORDER
    var knownKeys = {};
    for (var k = 0; k < CATEGORY_ORDER.length; k++) knownKeys[CATEGORY_ORDER[k]] = true;
    for (var otherKey in groups) {
      if (groups.hasOwnProperty(otherKey) && !knownKeys[otherKey]) {
        var otherLabel = createEl('div', 'category-label');
        otherLabel.textContent = otherKey;
        container.appendChild(otherLabel);
        for (var oe = 0; oe < groups[otherKey].length; oe++) {
          container.appendChild(createEventCard(groups[otherKey][oe]));
        }
      }
    }
  }

  function renderDiscoveredSources(sources) {
    var wrapper = document.getElementById('sources-container');
    if (!sources || sources.length === 0) return;

    var section = createEl('div', 'sources-section');

    var title = createEl('div', 'sources-title');
    title.textContent = 'Discovered Sources';
    section.appendChild(title);

    for (var i = 0; i < sources.length; i++) {
      var src = sources[i];
      var item = createEl('div', 'source-item');

      var name = createEl('a', 'source-name');
      name.textContent = src.name;
      name.href = src.url || '#';
      name.target = '_blank';
      name.rel = 'noopener noreferrer';
      item.appendChild(name);

      if (src.description) {
        var desc = createEl('div', 'source-desc');
        desc.textContent = src.description;
        item.appendChild(desc);
      }

      section.appendChild(item);
    }

    wrapper.appendChild(section);
  }

  function init() {
    var data = EVENTS_DATA;

    // Title
    var titleEl = document.getElementById('digest-title');
    titleEl.textContent = (data.meta && data.meta.title) ? data.meta.title : 'Events Digest';

    // Tab nav
    var tabNav = document.getElementById('tab-nav');
    var panelsContainer = document.getElementById('tab-panels');

    var weekdayCount = (data.weekday_events || []).length;
    var weekendCount = (data.weekend_events || []).length;

    // Build tab buttons using safe DOM methods
    tabNav.appendChild(createTabButton('Weekday', 'weekday', weekdayCount));
    tabNav.appendChild(createTabButton('Weekend', 'weekend', weekendCount));

    // Build panels
    var weekdayPanel = createEl('div', 'tab-panel');
    weekdayPanel.setAttribute('data-panel', 'weekday');
    renderEvents(data.weekday_events || [], weekdayPanel);
    panelsContainer.appendChild(weekdayPanel);

    var weekendPanel = createEl('div', 'tab-panel');
    weekendPanel.setAttribute('data-panel', 'weekend');
    renderEvents(data.weekend_events || [], weekendPanel);
    panelsContainer.appendChild(weekendPanel);

    // Tab switching
    var savedTab = null;
    try { savedTab = localStorage.getItem('events-digest-tab'); } catch(e) {}
    var activeTab = (savedTab === 'weekday' || savedTab === 'weekend') ? savedTab : 'weekday';

    function activateTab(tabName) {
      var tabs = tabNav.querySelectorAll('.tab');
      for (var t = 0; t < tabs.length; t++) {
        var isActive = tabs[t].getAttribute('data-tab') === tabName;
        if (isActive) tabs[t].classList.add('active');
        else tabs[t].classList.remove('active');
      }

      var panels = panelsContainer.querySelectorAll('.tab-panel');
      for (var p = 0; p < panels.length; p++) {
        var isActivePanel = panels[p].getAttribute('data-panel') === tabName;
        if (isActivePanel) panels[p].classList.add('active');
        else panels[p].classList.remove('active');
      }

      try { localStorage.setItem('events-digest-tab', tabName); } catch(e) {}
    }

    // Delegate click on tab nav (handles clicks on the count span inside tab button too)
    tabNav.addEventListener('click', function(e) {
      var target = e.target;
      while (target && target !== tabNav) {
        if (target.classList && target.classList.contains('tab')) {
          var tabName = target.getAttribute('data-tab');
          if (tabName) activateTab(tabName);
          return;
        }
        target = target.parentElement;
      }
    });

    activateTab(activeTab);

    // Feedback delegation
    document.addEventListener('click', function(e) {
      if (!e.target.classList || !e.target.classList.contains('feedback-btn')) return;

      var btn = e.target;
      var eventId = btn.getAttribute('data-event-id');
      var signal = btn.getAttribute('data-signal');
      var row = btn.parentElement;
      var siblings = row.querySelectorAll('.feedback-btn');

      // Clear all selections in this row
      for (var i = 0; i < siblings.length; i++) {
        siblings[i].classList.remove('selected-positive', 'selected-negative');
      }

      // Highlight selected button
      var isPositive = POSITIVE_SIGNALS.indexOf(signal) !== -1;
      btn.classList.add(isPositive ? 'selected-positive' : 'selected-negative');

      // Send feedback
      try {
        fetch('/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            event_id: eventId,
            signal: signal,
            timestamp: new Date().toISOString()
          })
        }).catch(function() {});
      } catch(e) {}
    });

    // Discovered sources
    renderDiscoveredSources(data.discovered_sources || []);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
