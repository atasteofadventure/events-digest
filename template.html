<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__DIGEST_TITLE__</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f4;
    color: #1c1917;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px 64px;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 24px;
    letter-spacing: -0.01em;
  }

  /* Tabs */
  .tab-nav {
    display: flex;
    gap: 24px;
    border-bottom: 1px solid #e7e5e4;
    margin-bottom: 28px;
  }

  .tab {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 8px 0 10px;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    color: #78716c;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .tab:hover {
    color: #44403c;
  }

  .tab.active {
    color: #1c1917;
    border-bottom-color: #1c1917;
  }

  .tab .count {
    font-size: 0.75rem;
    font-weight: 500;
    color: #a8a29e;
    margin-left: 4px;
  }

  .tab.active .count {
    color: #78716c;
  }

  /* Tab panels */
  .tab-panel {
    display: none;
  }

  .tab-panel.active {
    display: block;
  }

  /* Category sections */
  .category-section {
    margin-top: 28px;
  }

  .category-section:first-child {
    margin-top: 0;
  }

  .category-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    padding: 4px 0 12px;
    user-select: none;
  }

  .category-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #a8a29e;
  }

  .category-toggle {
    font-size: 0.7rem;
    color: #a8a29e;
    transition: transform 0.2s;
  }

  .category-section.collapsed .category-toggle {
    transform: rotate(-90deg);
  }

  .category-body {
    overflow: hidden;
    transition: max-height 0.25s ease;
  }

  .category-section.collapsed .category-body {
    max-height: 0 !important;
    overflow: hidden;
  }

  /* Event cards */
  .event-card {
    background: #fff;
    border: 1px solid #e7e5e4;
    border-radius: 8px;
    border-left: 3px solid var(--accent, #a8a29e);
    padding: 16px 18px;
    margin-bottom: 12px;
  }

  .event-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }

  .event-name {
    font-weight: 600;
    font-size: 0.95rem;
    color: #1c1917;
    text-decoration: none;
  }

  .event-name:hover {
    text-decoration: underline;
  }

  .price-badge {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .price-badge.free {
    background: #ecfdf5;
    color: #059669;
  }

  .price-badge.paid {
    background: #f5f5f4;
    color: #78716c;
  }

  .event-meta {
    font-size: 0.8rem;
    color: #78716c;
    margin-bottom: 6px;
  }

  .event-meta span + span::before {
    content: "\00b7";
    margin: 0 6px;
  }

  .event-why {
    font-size: 0.85rem;
    font-style: italic;
    color: #57534e;
    margin-bottom: 10px;
  }

  .feedback-row {
    display: flex;
    gap: 4px;
  }

  .feedback-btn {
    font-family: inherit;
    font-size: 0.85rem;
    background: none;
    border: none;
    padding: 2px 4px;
    cursor: pointer;
    color: #d6d3d1;
    transition: color 0.15s;
    line-height: 1;
  }

  .feedback-btn:hover {
    color: #78716c;
  }

  .feedback-btn.selected-positive {
    color: #059669;
  }

  .feedback-btn.selected-negative {
    color: #dc2626;
  }

  /* Save button */
  .save-btn {
    font-family: inherit;
    font-size: 0.85rem;
    background: none;
    border: none;
    padding: 2px 4px;
    cursor: pointer;
    color: #d6d3d1;
    transition: color 0.15s;
    line-height: 1;
    margin-left: auto;
  }

  .save-btn:hover {
    color: #f59e0b;
  }

  .save-btn.saved {
    color: #f59e0b;
  }

  /* Day filter pills */
  .day-filter {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .day-pill {
    font-family: inherit;
    font-size: 0.7rem;
    font-weight: 500;
    background: #fff;
    border: 1px solid #e7e5e4;
    border-radius: 16px;
    padding: 4px 12px;
    cursor: pointer;
    color: #78716c;
    transition: all 0.15s;
  }

  .day-pill:hover {
    border-color: #a8a29e;
    color: #44403c;
  }

  .day-pill.active {
    background: #1c1917;
    border-color: #1c1917;
    color: #fff;
  }

  /* Saved section */
  .saved-section {
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid #e7e5e4;
  }

  .saved-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    padding: 4px 0 12px;
    user-select: none;
  }

  .saved-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #f59e0b;
  }

  .saved-empty {
    font-size: 0.8rem;
    color: #a8a29e;
    font-style: italic;
    padding: 8px 0;
  }

  .saved-card {
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
  }

  .saved-card .event-name {
    font-size: 0.85rem;
  }

  .saved-card .saved-meta {
    font-size: 0.75rem;
    color: #78716c;
  }

  .saved-card .unsave-btn {
    font-family: inherit;
    font-size: 0.7rem;
    background: none;
    border: none;
    cursor: pointer;
    color: #a8a29e;
    margin-left: auto;
  }

  .saved-card .unsave-btn:hover {
    color: #dc2626;
  }

  /* Discovered Sources */
  .sources-section {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid #e7e5e4;
  }

  .sources-title {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #a8a29e;
    margin-bottom: 12px;
  }

  .source-item {
    background: #fff;
    border: 1px solid #e7e5e4;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
  }

  .source-name {
    font-weight: 600;
    font-size: 0.9rem;
    color: #1c1917;
    text-decoration: none;
  }

  .source-name:hover {
    text-decoration: underline;
  }

  .source-desc {
    font-size: 0.8rem;
    color: #78716c;
    margin-top: 2px;
  }

  /* Collection stats */
  .stats-bar {
    font-size: 0.8rem;
    color: #a8a29e;
    margin-bottom: 16px;
  }

  .stats-bar a {
    color: #3b82f6;
    text-decoration: none;
  }

  .stats-bar a:hover {
    text-decoration: underline;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: #a8a29e;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<div class="container">
  <h1 id="digest-title"></h1>
  <div id="collection-stats"></div>
  <div id="saved-container"></div>
  <nav class="tab-nav" id="tab-nav"></nav>
  <div id="day-filter-container"></div>
  <div id="tab-panels"></div>
  <div id="sources-container"></div>
</div>

<script>
var EVENTS_DATA = /*__EVENTS_JSON__*/{"meta":{"title":"Sample Week","type":"week"},"weekday_events":[],"weekend_events":[],"discovered_sources":[]}/**/;

(function() {
  'use strict';

  var CATEGORY_ORDER = [
    'tech_ai',
    'workshops_classes',
    'tours_experiences',
    'film_screenings',
    'art_exhibitions',
    'talks_lectures'
  ];

  var CATEGORY_CONFIG = {
    tech_ai:           { label: 'Tech & AI',            color: '#3b82f6' },
    talks_lectures:    { label: 'Talks & Lectures',     color: '#8b5cf6' },
    workshops_classes:  { label: 'Workshops & Classes',   color: '#f59e0b' },
    tours_experiences:  { label: 'Tours & Experiences',   color: '#10b981' },
    film_screenings:    { label: 'Film & Screenings',     color: '#ef4444' },
    art_exhibitions:    { label: 'Art & Exhibitions',     color: '#ec4899' }
  };

  var POSITIVE_SIGNALS = ['thumbs_up'];

  var SHORT_DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  var SHORT_MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                      'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

  function formatDate(dateStr) {
    var parts = dateStr.split('-');
    var d = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
    return SHORT_DAYS[d.getDay()] + ', ' + SHORT_MONTHS[d.getMonth()] + ' ' + d.getDate();
  }

  function groupByCategory(events) {
    var groups = {};
    for (var i = 0; i < events.length; i++) {
      var cat = events[i].category || 'other';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(events[i]);
    }
    return groups;
  }

  function createEl(tag, className) {
    var el = document.createElement(tag);
    if (className) el.className = className;
    return el;
  }

  function createTabButton(label, tabKey, count) {
    var btn = createEl('button', 'tab');
    btn.setAttribute('data-tab', tabKey);
    btn.appendChild(document.createTextNode(label + ' '));
    var countSpan = createEl('span', 'count');
    countSpan.textContent = String(count);
    btn.appendChild(countSpan);
    return btn;
  }

  function createEventCard(evt) {
    var card = createEl('div', 'event-card');
    var catConfig = CATEGORY_CONFIG[evt.category];
    if (catConfig) {
      card.style.setProperty('--accent', catConfig.color);
    }

    // Header: name link + price badge
    var header = createEl('div', 'event-header');

    var nameLink = createEl('a', 'event-name');
    nameLink.textContent = evt.name;
    nameLink.href = evt.url || '#';
    nameLink.target = '_blank';
    nameLink.rel = 'noopener noreferrer';
    header.appendChild(nameLink);

    if (evt.price) {
      var badge = createEl('span', 'price-badge');
      var isFree = evt.price.toLowerCase() === 'free';
      badge.className = 'price-badge ' + (isFree ? 'free' : 'paid');
      badge.textContent = evt.price;
      header.appendChild(badge);
    }

    card.appendChild(header);

    // Meta line
    var meta = createEl('div', 'event-meta');
    var metaParts = [];
    if (evt.date) metaParts.push(formatDate(evt.date));
    if (evt.time) metaParts.push(evt.time);
    if (evt.venue) metaParts.push(evt.venue);
    if (evt.neighborhood) metaParts.push(evt.neighborhood);

    for (var m = 0; m < metaParts.length; m++) {
      var span = createEl('span');
      span.textContent = metaParts[m];
      meta.appendChild(span);
    }
    card.appendChild(meta);

    // Why sentence
    if (evt.why) {
      var why = createEl('div', 'event-why');
      why.textContent = evt.why;
      card.appendChild(why);
    }

    // Action row: feedback + save
    var feedbackRow = createEl('div', 'feedback-row');
    var signals = [
      { key: 'thumbs_up',   label: '\u25B2' },
      { key: 'thumbs_down', label: '\u25BC' }
    ];

    for (var s = 0; s < signals.length; s++) {
      var btn = createEl('button', 'feedback-btn');
      btn.textContent = signals[s].label;
      btn.setAttribute('data-event-id', evt.id);
      btn.setAttribute('data-signal', signals[s].key);
      btn.setAttribute('title', signals[s].key === 'thumbs_up' ? 'More like this' : 'Less like this');
      feedbackRow.appendChild(btn);
    }

    var saveBtn = createEl('button', 'save-btn');
    saveBtn.textContent = '\u2606';
    saveBtn.setAttribute('data-event-id', evt.id);
    saveBtn.setAttribute('title', 'Save event');
    if (savedEvents[evt.id]) {
      saveBtn.classList.add('saved');
      saveBtn.textContent = '\u2605';
    }
    feedbackRow.appendChild(saveBtn);

    card.appendChild(feedbackRow);

    return card;
  }

  // Saved events state (persisted in localStorage + server file)
  var savedEvents = {};
  try {
    var saved = localStorage.getItem('events-digest-saved');
    if (saved) savedEvents = JSON.parse(saved);
  } catch(e) {}
  // Also try loading from server (backup persistence)
  try {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/saved-events', false); // synchronous
    xhr.send();
    if (xhr.status === 200) {
      var serverSaved = JSON.parse(xhr.responseText);
      // Merge: server data fills in anything localStorage missed
      for (var sk in serverSaved) {
        if (serverSaved.hasOwnProperty(sk) && !savedEvents[sk]) {
          savedEvents[sk] = serverSaved[sk];
        }
      }
    }
  } catch(e) {}

  // All events indexed by id for quick lookup
  var allEventsById = {};

  function persistSaved() {
    try { localStorage.setItem('events-digest-saved', JSON.stringify(savedEvents)); } catch(e) {}
    try {
      fetch('/saved-events', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(savedEvents)
      }).catch(function() {});
    } catch(e) {}
  }

  function renderEvents(events, container) {
    container.textContent = '';
    if (!events || events.length === 0) {
      var empty = createEl('div', 'empty-state');
      empty.textContent = 'No events yet.';
      container.appendChild(empty);
      return;
    }

    var groups = groupByCategory(events);

    for (var c = 0; c < CATEGORY_ORDER.length; c++) {
      var catKey = CATEGORY_ORDER[c];
      var catEvents = groups[catKey];
      if (!catEvents || catEvents.length === 0) continue;

      var config = CATEGORY_CONFIG[catKey];

      var section = createEl('div', 'category-section');
      var header = createEl('div', 'category-header');
      var label = createEl('div', 'category-label');
      label.textContent = (config ? config.label : catKey) + ' (' + catEvents.length + ')';
      var toggle = createEl('span', 'category-toggle');
      toggle.textContent = '\u25BC';
      header.appendChild(label);
      header.appendChild(toggle);
      section.appendChild(header);

      var body = createEl('div', 'category-body');
      for (var e = 0; e < catEvents.length; e++) {
        body.appendChild(createEventCard(catEvents[e]));
      }
      section.appendChild(body);

      header.addEventListener('click', (function(sec) {
        return function() { sec.classList.toggle('collapsed'); };
      })(section));

      container.appendChild(section);
    }

    // Render any categories not in CATEGORY_ORDER
    var knownKeys = {};
    for (var k = 0; k < CATEGORY_ORDER.length; k++) knownKeys[CATEGORY_ORDER[k]] = true;
    for (var otherKey in groups) {
      if (groups.hasOwnProperty(otherKey) && !knownKeys[otherKey]) {
        var otherSection = createEl('div', 'category-section');
        var otherHeader = createEl('div', 'category-header');
        var otherLabel = createEl('div', 'category-label');
        otherLabel.textContent = otherKey;
        otherHeader.appendChild(otherLabel);
        otherSection.appendChild(otherHeader);
        var otherBody = createEl('div', 'category-body');
        for (var oe = 0; oe < groups[otherKey].length; oe++) {
          otherBody.appendChild(createEventCard(groups[otherKey][oe]));
        }
        otherSection.appendChild(otherBody);
        container.appendChild(otherSection);
      }
    }
  }

  function getUniqueDays(events) {
    var seen = {};
    var days = [];
    for (var i = 0; i < events.length; i++) {
      var d = events[i].date;
      if (d && !seen[d]) {
        seen[d] = true;
        days.push(d);
      }
    }
    days.sort();
    return days;
  }

  function filterByDay(events, dateStr) {
    if (!dateStr) return events;
    var result = [];
    for (var i = 0; i < events.length; i++) {
      if (events[i].date === dateStr) result.push(events[i]);
    }
    return result;
  }

  function renderSavedSection() {
    var container = document.getElementById('saved-container');
    container.textContent = '';

    var ids = Object.keys(savedEvents);
    if (ids.length === 0) return;

    var section = createEl('div', 'saved-section');
    var headerEl = createEl('div', 'saved-header');
    var labelEl = createEl('div', 'saved-label');
    labelEl.textContent = 'Saved (' + ids.length + ')';
    headerEl.appendChild(labelEl);
    section.appendChild(headerEl);

    for (var i = 0; i < ids.length; i++) {
      var evt = allEventsById[ids[i]] || savedEvents[ids[i]];
      if (!evt) continue;

      var card = createEl('div', 'saved-card');

      var nameLink = createEl('a', 'event-name');
      nameLink.textContent = evt.name;
      nameLink.href = evt.url || '#';
      nameLink.target = '_blank';
      nameLink.rel = 'noopener noreferrer';
      card.appendChild(nameLink);

      var metaSpan = createEl('span', 'saved-meta');
      var parts = [];
      if (evt.date) parts.push(formatDate(evt.date));
      if (evt.time) parts.push(evt.time);
      if (evt.venue) parts.push(evt.venue);
      metaSpan.textContent = parts.join(' \u00b7 ');
      card.appendChild(metaSpan);

      var unsaveBtn = createEl('button', 'unsave-btn');
      unsaveBtn.textContent = '\u2715';
      unsaveBtn.setAttribute('data-unsave-id', ids[i]);
      unsaveBtn.setAttribute('title', 'Remove from saved');
      card.appendChild(unsaveBtn);

      section.appendChild(card);
    }

    container.appendChild(section);
  }

  function renderDiscoveredSources(sources) {
    var wrapper = document.getElementById('sources-container');
    if (!sources || sources.length === 0) return;

    var section = createEl('div', 'sources-section');

    var title = createEl('div', 'sources-title');
    title.textContent = 'Discovered Sources';
    section.appendChild(title);

    for (var i = 0; i < sources.length; i++) {
      var src = sources[i];
      var item = createEl('div', 'source-item');

      var name = createEl('a', 'source-name');
      name.textContent = src.name;
      name.href = src.url || '#';
      name.target = '_blank';
      name.rel = 'noopener noreferrer';
      item.appendChild(name);

      if (src.description) {
        var desc = createEl('div', 'source-desc');
        desc.textContent = src.description;
        item.appendChild(desc);
      }

      section.appendChild(item);
    }

    wrapper.appendChild(section);
  }

  function init() {
    var data = EVENTS_DATA;
    var weekdayEvents = data.weekday_events || [];
    var weekendEvents = data.weekend_events || [];

    // Index all events by id
    var all = weekdayEvents.concat(weekendEvents);
    for (var ai = 0; ai < all.length; ai++) {
      allEventsById[all[ai].id] = all[ai];
    }

    // Title
    var titleEl = document.getElementById('digest-title');
    titleEl.textContent = (data.meta && data.meta.title) ? data.meta.title : 'Events Digest';

    // Collection stats
    var statsContainer = document.getElementById('collection-stats');
    var shown = weekdayEvents.length + weekendEvents.length;
    var total = (data.meta && data.meta.total_collected) ? data.meta.total_collected : null;
    if (total && total > shown) {
      var statsBar = createEl('div', 'stats-bar');
      var digestDate = (data.meta && data.meta.week_start) ? data.meta.week_start : '';
      var allFileUrl = '/digests/' + digestDate + '-all.json';
      var statsText = document.createTextNode('Showing ' + shown + ' of ' + total + ' events found. ');
      statsBar.appendChild(statsText);
      var allLink = createEl('a');
      allLink.href = allFileUrl;
      allLink.target = '_blank';
      allLink.textContent = 'View all ' + total;
      statsBar.appendChild(allLink);
      statsContainer.appendChild(statsBar);
    }

    // Saved section
    renderSavedSection();

    // Tab nav
    var tabNav = document.getElementById('tab-nav');
    var panelsContainer = document.getElementById('tab-panels');
    var dayFilterContainer = document.getElementById('day-filter-container');

    tabNav.appendChild(createTabButton('Weekday', 'weekday', weekdayEvents.length));
    tabNav.appendChild(createTabButton('Weekend', 'weekend', weekendEvents.length));

    // Build panels (will be re-rendered on day filter)
    var weekdayPanel = createEl('div', 'tab-panel');
    weekdayPanel.setAttribute('data-panel', 'weekday');
    panelsContainer.appendChild(weekdayPanel);

    var weekendPanel = createEl('div', 'tab-panel');
    weekendPanel.setAttribute('data-panel', 'weekend');
    panelsContainer.appendChild(weekendPanel);

    var activeTab = 'weekday';
    var activeDayFilter = null; // null = all days
    try {
      var st = localStorage.getItem('events-digest-tab');
      if (st === 'weekday' || st === 'weekend') activeTab = st;
    } catch(e) {}

    function renderDayFilter(events) {
      dayFilterContainer.textContent = '';
      var days = getUniqueDays(events);
      if (days.length <= 1) return; // no filter needed for 0-1 days

      var filterRow = createEl('div', 'day-filter');

      var allPill = createEl('button', 'day-pill' + (activeDayFilter === null ? ' active' : ''));
      allPill.textContent = 'All';
      allPill.setAttribute('data-day', '');
      filterRow.appendChild(allPill);

      for (var i = 0; i < days.length; i++) {
        var pill = createEl('button', 'day-pill' + (activeDayFilter === days[i] ? ' active' : ''));
        pill.textContent = formatDate(days[i]);
        pill.setAttribute('data-day', days[i]);
        filterRow.appendChild(pill);
      }

      dayFilterContainer.appendChild(filterRow);
    }

    function renderCurrentView() {
      var events = activeTab === 'weekday' ? weekdayEvents : weekendEvents;
      var panel = activeTab === 'weekday' ? weekdayPanel : weekendPanel;

      renderDayFilter(events);

      var filtered = activeDayFilter ? filterByDay(events, activeDayFilter) : events;
      renderEvents(filtered, panel);
    }

    function activateTab(tabName) {
      activeTab = tabName;
      activeDayFilter = null; // reset day filter on tab switch

      var tabs = tabNav.querySelectorAll('.tab');
      for (var t = 0; t < tabs.length; t++) {
        var isActive = tabs[t].getAttribute('data-tab') === tabName;
        if (isActive) tabs[t].classList.add('active');
        else tabs[t].classList.remove('active');
      }

      var panels = panelsContainer.querySelectorAll('.tab-panel');
      for (var p = 0; p < panels.length; p++) {
        var isActivePanel = panels[p].getAttribute('data-panel') === tabName;
        if (isActivePanel) panels[p].classList.add('active');
        else panels[p].classList.remove('active');
      }

      try { localStorage.setItem('events-digest-tab', tabName); } catch(e) {}
      renderCurrentView();
    }

    // Tab clicks
    tabNav.addEventListener('click', function(e) {
      var target = e.target;
      while (target && target !== tabNav) {
        if (target.classList && target.classList.contains('tab')) {
          var tabName = target.getAttribute('data-tab');
          if (tabName) activateTab(tabName);
          return;
        }
        target = target.parentElement;
      }
    });

    // Day filter clicks
    dayFilterContainer.addEventListener('click', function(e) {
      if (!e.target.classList || !e.target.classList.contains('day-pill')) return;
      var dayVal = e.target.getAttribute('data-day');
      activeDayFilter = dayVal || null;
      renderCurrentView();
    });

    activateTab(activeTab);

    // Global click delegation for feedback, save, unsave
    document.addEventListener('click', function(e) {
      var target = e.target;

      // Feedback buttons
      if (target.classList && target.classList.contains('feedback-btn')) {
        var eventId = target.getAttribute('data-event-id');
        var signal = target.getAttribute('data-signal');
        var row = target.parentElement;
        var siblings = row.querySelectorAll('.feedback-btn');
        for (var i = 0; i < siblings.length; i++) {
          siblings[i].classList.remove('selected-positive', 'selected-negative');
        }
        var isPositive = POSITIVE_SIGNALS.indexOf(signal) !== -1;
        target.classList.add(isPositive ? 'selected-positive' : 'selected-negative');
        try {
          fetch('/feedback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ event_id: eventId, signal: signal, timestamp: new Date().toISOString() })
          }).catch(function() {});
        } catch(ex) {}
        return;
      }

      // Save button
      if (target.classList && target.classList.contains('save-btn')) {
        var saveId = target.getAttribute('data-event-id');
        if (savedEvents[saveId]) {
          delete savedEvents[saveId];
          target.classList.remove('saved');
          target.textContent = '\u2606';
        } else {
          savedEvents[saveId] = allEventsById[saveId] || { id: saveId };
          target.classList.add('saved');
          target.textContent = '\u2605';
        }
        persistSaved();
        renderSavedSection();
        try {
          fetch('/feedback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ event_id: saveId, signal: 'saved', timestamp: new Date().toISOString() })
          }).catch(function() {});
        } catch(ex) {}
        return;
      }

      // Unsave button
      if (target.classList && target.classList.contains('unsave-btn')) {
        var unsaveId = target.getAttribute('data-unsave-id');
        delete savedEvents[unsaveId];
        persistSaved();
        renderSavedSection();
        // Also update the star in the main list if visible
        var stars = document.querySelectorAll('.save-btn[data-event-id="' + unsaveId + '"]');
        for (var si = 0; si < stars.length; si++) {
          stars[si].classList.remove('saved');
          stars[si].textContent = '\u2606';
        }
        return;
      }
    });

    // Discovered sources
    renderDiscoveredSources(data.discovered_sources || []);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
